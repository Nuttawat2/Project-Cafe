<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --border: #2a2a2a;
            --border-hover: #444;
            --text-primary: #e8e0d5;
            --text-secondary: #a09080;
            --accent: #c9a96e;
            --accent-hover: #b8945a;
            --danger: #e57373;
            --danger-bg: rgba(198,40,40,0.15);
        }

        :root[data-theme="light"] {
            --bg-primary: #faf8f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0ebe3;
            --border: #e0d8cc;
            --border-hover: #c9b99a;
            --text-primary: #2c1f0e;
            --text-secondary: #7a6550;
            --accent: #9a6f3a;
            --accent-hover: #7d5a2e;
            --danger: #c62828;
            --danger-bg: rgba(198,40,40,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
        }

        .logo h1 span { color: var(--text-primary); font-weight: 300; }

        .logo p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: 16px;
            padding: 36px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-tertiary);
            border: 0.5px solid var(--border-hover);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--accent); }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover { background: var(--accent-hover); }

        .error-msg {
            background: var(--danger-bg);
            border: 0.5px solid var(--danger);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 18px;
        }

        .theme-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 0.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 12px;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 0.5px;
            background: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-customer {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: var(--text-secondary);
            border: 0.5px solid var(--border-hover);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-customer:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="login-wrap">
    <div class="logo">
        <h1>CAFE <span>SYSTEM</span></h1>
        <p>ระบบจัดการร้านกาแฟ</p>
    </div>

    <div class="login-card">
        <div class="card-title">เข้าสู่ระบบ Staff / Admin</div>

        {% if form.errors %}
        <div class="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>ชื่อผู้ใช้</label>
                <input type="text" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label>รหัสผ่าน</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
        </form>

        <div class="divider">หรือ</div>
        <a href="{% url 'customer_menu' %}" class="btn-customer">เข้าชมเมนูในฐานะลูกค้า</a>
    </div>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeBtn');
        if (html.getAttribute('data-theme') === 'dark') {
            html.setAttribute('data-theme', 'light');
            btn.textContent = '☀️';
            localStorage.setItem('theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark');
            btn.textContent = '🌙';
            localStorage.setItem('theme', 'dark');
        }
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
</script>

</body>
</html>
